<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DC Multivers — Chronologeek</title>
<style>
:root{
  --bg:#08080f;--surface:#0f0f1a;--surface2:#161625;--border:#1e1e35;--border2:#2a2a48;
  --accent:#7c6af7;--accent2:#f06292;--text:#e2e2f0;--muted:#686880;--muted2:#9090b0;
  --green:#56c27a;--radius:12px;--tl-color:#1e90ff;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 80% 60% at 20% -10%,rgba(124,106,247,.1),transparent 60%),radial-gradient(ellipse 60% 50% at 80% 110%,rgba(240,98,146,.07),transparent 60%);pointer-events:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── HEADER ── */
header{background:rgba(8,8,15,.88);border-bottom:1px solid var(--border);padding:0 2rem;position:sticky;top:0;z-index:200;backdrop-filter:blur(20px)}
nav{max-width:1600px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;height:62px}
.logo{display:flex;align-items:center;gap:.6rem;cursor:pointer;flex-shrink:0}
.logo img{height:30px;display:block;object-fit:contain;background:transparent}
.nav-links{display:flex;gap:1.25rem;align-items:center}
.nav-links a{color:var(--muted2);font-size:.88rem;text-decoration:none;cursor:pointer;transition:color .2s;white-space:nowrap}
.nav-links a:hover{color:var(--text)}
.nav-sp{flex:1}
.nav-maj{font-size:.7rem;color:var(--muted);letter-spacing:.04em;white-space:nowrap}
.disc-btn{background:linear-gradient(135deg,#5865f2,#4752c4);color:#fff!important;padding:.4rem 1rem;border-radius:8px;font-size:.82rem;font-weight:600;white-space:nowrap;text-decoration:none}
.pbn{display:none;align-items:center;gap:.6rem;font-size:.78rem;color:var(--muted2)}
.pbn.show{display:flex}
.pbn-track{width:80px;height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.pbn-fill{height:100%;border-radius:2px;transition:width .4s}

/* ── PAGE ── */
.tl-page{max-width:1600px;margin:0 auto;padding:2rem 1.5rem}
.bc{font-size:.8rem;color:var(--muted);cursor:pointer;margin-bottom:1.25rem;display:inline-flex;align-items:center;gap:.4rem}
.bc:hover{color:var(--text)}
.page-title{font-size:2rem;font-weight:900;letter-spacing:-.5px;margin-bottom:.3rem;color:var(--tl-color);text-shadow:0 0 40px rgba(30,144,255,.3)}
.page-sub{font-size:.9rem;color:var(--muted2);margin-bottom:1.5rem}
.progress-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.4rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.pb-info{flex:1}
.pb-label{font-size:.75rem;color:var(--muted);margin-bottom:.35rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.pb-track{height:5px;background:var(--border2);border-radius:3px;overflow:hidden;margin:.35rem 0}
.pb-fill{height:100%;border-radius:3px;transition:width .4s;background:linear-gradient(90deg,var(--tl-color),var(--accent2))}
.pb-counts{font-size:.82rem;color:var(--muted2)}
.pb-hint{font-size:.72rem;color:var(--muted);margin-top:.3rem}
.pb-reset{background:none;border:1px solid var(--border2);color:var(--muted2);border-radius:8px;padding:.4rem .9rem;font-size:.78rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.pb-reset:hover{border-color:var(--accent);color:var(--text)}
.nb{font-size:.85rem;color:var(--muted2);line-height:1.7;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.4rem;margin-bottom:1.25rem}
.nb strong{color:var(--text)}
.leg{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;margin-bottom:1rem;font-size:.78rem;color:var(--muted2)}
.leg-title{font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-right:.5rem}
.b{display:inline-block;font-size:.6rem;font-weight:700;letter-spacing:.05em;padding:.15rem .45rem;border-radius:20px}
.bf{background:rgba(124,106,247,.2);color:#a78bfa;border:1px solid rgba(124,106,247,.3)}
.bs{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
.bsp{background:rgba(148,163,184,.15);color:#94a3b8;border:1px solid rgba(148,163,184,.25)}
.ft{font-size:.58rem;background:rgba(255,165,0,.2);color:#ffa500;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:.05em}
.dt{font-size:.6rem;background:rgba(255,255,255,.06);color:var(--muted2);padding:.1rem .4rem;border-radius:3px;border:1px solid var(--border)}
.filter-bar{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.25rem}
.filter-group{display:flex;align-items:center;flex-wrap:wrap;gap:.4rem}
.filter-label{font-size:.72rem;color:var(--muted);white-space:nowrap;margin-right:.2rem}
.fbt{background:var(--surface);border:1px solid var(--border2);color:var(--muted2);border-radius:20px;padding:.25rem .7rem;font-size:.72rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.fbt.active{background:rgba(124,106,247,.15);border-color:var(--accent);color:var(--text)}
.fbt:not(.active){opacity:.4;text-decoration:line-through}

/* ── MODE SWITCH ── */
.mode-switch{display:flex;gap:.5rem;margin-bottom:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.3rem;width:fit-content}
.mode-btn{padding:.4rem 1.1rem;border-radius:7px;border:none;background:none;color:var(--muted2);font-size:.82rem;cursor:pointer;transition:all .2s;font-weight:500}
.mode-btn.active{background:var(--accent);color:#fff;font-weight:600}

/* ═══════════════════════════════════════════════════
   VUE CARTE — colonnes compactes côte à côte
═══════════════════════════════════════════════════ */
.card-view{display:none}
.card-view.active{display:flex;gap:0;overflow-x:auto}

/* Axe temporel */
.time-axis{flex-shrink:0;width:52px;padding-top:44px;position:sticky;left:0;z-index:10;background:var(--bg)}
.time-tick{position:relative;font-size:.68rem;color:var(--muted);text-align:right;padding-right:8px}
.time-tick::after{content:'';position:absolute;right:0;top:50%;width:6px;height:1px;background:var(--border2)}

/* Colonnes vue carte */
.cv-cols{display:flex;gap:6px;flex:1;min-width:0}
.cv-col{flex:1;min-width:150px;display:flex;flex-direction:column}
.cv-col.wide{flex:2;min-width:300px}
.cv-col-head{position:sticky;top:62px;z-index:20;background:var(--bg);padding:.4rem .5rem;border-radius:8px 8px 0 0;font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;text-align:center;border-bottom:2px solid;backdrop-filter:blur(10px);height:44px;display:flex;align-items:center;justify-content:center}

/* Elseworlds : 3 sous-colonnes */
.cv-col.wide .cv-inner{display:flex;gap:4px;flex:1}
.cv-sub-col{flex:1;min-width:90px;display:flex;flex-direction:column}
.cv-sub-head{font-size:.6rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;text-align:center;padding:.2rem .3rem;color:var(--muted);border-bottom:1px solid var(--border);margin-bottom:3px}

/* Entrée compacte vue carte */
.cv-entry{border-radius:6px;padding:.35rem .45rem;margin-bottom:3px;cursor:pointer;transition:filter .15s,transform .1s;border:1px solid transparent;font-size:.72rem;line-height:1.3;position:relative}
.cv-entry:hover{filter:brightness(1.3);transform:translateX(1px)}
.cv-entry.done{opacity:.4}
.cv-entry-title{font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.71rem}
.cv-entry-date{font-size:.6rem;color:var(--muted2)}
.cv-entry-dim{font-size:.56rem;color:var(--muted);opacity:.7}
.cv-check{width:12px;height:12px;border:1px solid var(--border2);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-right:4px;vertical-align:middle}
.cv-check-inner{font-size:.5rem;color:#fff;font-weight:700}
.cv-entry.done .cv-check{background:var(--accent);border-color:var(--accent)}
.cv-era-label{font-size:.6rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);padding:.3rem .2rem .1rem;opacity:.6}
.cv-spacer{flex:1}

/* Séparateurs temporels */
.cv-year-sep{font-size:.58rem;color:var(--border2);border-top:1px solid var(--border);padding:.15rem 0;text-align:center;margin:.1rem 0;position:sticky;left:0}

/* ═══════════════════════════════════════════════════
   VUE DÉTAIL — identique SW/Marvel
═══════════════════════════════════════════════════ */
.detail-view{display:none}
.detail-view.active{display:block}
.detail-col-select{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
.dcol-btn{padding:.35rem .85rem;border-radius:20px;border:1px solid;background:none;cursor:pointer;font-size:.78rem;font-weight:600;transition:all .2s;opacity:.4}
.dcol-btn.active{opacity:1}

/* Sections de colonnes dans vue détail */
.detail-col-section{margin-bottom:2rem}
.detail-col-title{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.5rem .6rem;border-radius:8px;margin-bottom:.75rem;display:inline-block}

/* Entrées vue détail — identique autres pages */
.en{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.5rem;overflow:hidden;transition:box-shadow .2s,border-color .2s}
.en:hover{border-color:var(--border2);box-shadow:0 2px 12px rgba(0,0,0,.3)}
.en.must{border-left:3px solid #ffd700}
.en.imp{border-left:3px solid rgba(255,100,0,.7)}
.en.done{opacity:.55}
.en.open{border-color:var(--accent);box-shadow:0 4px 20px rgba(124,106,247,.2)}
.en-top{display:flex;align-items:flex-start;gap:.55rem;padding:.65rem .75rem;cursor:pointer}
.en-check{width:20px;height:20px;flex-shrink:0;border:1px solid var(--border2);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:1px;transition:background .15s,border .15s}
.en-check:hover{border-color:var(--accent)}
.en.done .en-check{background:var(--accent);border-color:var(--accent)}
.checkmark{font-size:.7rem;color:#fff;font-weight:700}
.en-datebadge{display:flex;flex-direction:column;gap:2px;flex-shrink:0;min-width:58px}
.en-level-icon{font-size:.75rem;min-height:14px}
.date-main{font-size:.72rem;color:var(--muted2);white-space:nowrap}
.dim-badge{font-size:.6rem;background:rgba(255,255,255,.06);color:var(--muted);padding:1px 4px;border-radius:3px;white-space:nowrap;border:1px solid var(--border)}
.ep{width:56px;height:38px;flex-shrink:0;border-radius:6px;overflow:hidden;background:var(--surface2);display:flex;align-items:center;justify-content:center;position:relative}
.ep img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s}
.ep img.loaded{opacity:1}
.pp{font-size:1rem}
.em{flex:1;min-width:0}
.tr{display:flex;align-items:center;flex-wrap:wrap;gap:.3rem;margin-bottom:2px}
.en-name{font-size:.84rem;font-weight:600;color:var(--text);line-height:1.3}
.enote{font-size:.72rem;color:var(--muted2);margin:.15rem 0;font-style:italic;line-height:1.4}
.esub{margin-top:.2rem}
.si{font-size:.72rem;color:var(--muted2);padding:.05rem 0 .05rem .4rem;line-height:1.4}
.en-expand{display:none;border-top:1px solid var(--border);padding:.75rem}
.en.open .en-expand{display:block}
.expand-inner{display:flex;gap:.85rem}
.expand-poster{width:80px;flex-shrink:0;cursor:pointer;position:relative;border-radius:6px;overflow:hidden}
.expand-poster img{width:100%;border-radius:6px;display:block}
.expand-poster-ov{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:1.2rem}
.expand-poster:hover .expand-poster-ov{opacity:1}
.expand-info{flex:1;min-width:0}
.expand-synopsis{font-size:.8rem;line-height:1.6;color:var(--muted2);margin-bottom:.5rem}
.expand-meta{display:flex;flex-wrap:wrap;gap:.35rem .8rem;font-size:.75rem;color:var(--muted2);margin-bottom:.5rem}
.expand-meta strong{color:var(--text)}
.expand-trailer-link{display:inline-block;font-size:.75rem;color:var(--accent);text-decoration:none;margin-top:.25rem}
.expand-trailer-link:hover{text-decoration:underline}
.expand-loading,.expand-no-data{font-size:.8rem;color:var(--muted);padding:.3rem 0}

/* era-node */
.era-node{display:flex;align-items:center;gap:.5rem;padding:.3rem 0;margin:.6rem 0 .3rem}
.era-node-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.era-label{font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;opacity:.85}

/* Popup modal vue carte */
.cv-modal{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:1rem}
.cv-modal.open{display:flex}
.cv-modal-inner{background:var(--surface);border:1px solid var(--border2);border-radius:16px;max-width:480px;width:100%;padding:1.5rem;position:relative;max-height:90vh;overflow-y:auto}
.cv-modal-close{position:absolute;top:.8rem;right:.8rem;background:none;border:none;color:var(--muted2);font-size:1.2rem;cursor:pointer;padding:.2rem .5rem;border-radius:5px}
.cv-modal-close:hover{color:var(--text)}
.cv-modal-title{font-size:1.1rem;font-weight:800;margin-bottom:.2rem;padding-right:2rem}
.cv-modal-meta{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.75rem}
.cv-modal-body{font-size:.82rem;line-height:1.6;color:var(--muted2)}
.cv-modal-body strong{color:var(--text)}

/* PM */
.pm{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.9);align-items:center;justify-content:center;cursor:pointer}
.pm.o{display:flex}
.pm img{max-width:90vw;max-height:90vh;border-radius:10px}
.pm-x{position:fixed;top:1rem;right:1.5rem;font-size:1.5rem;color:#fff;cursor:pointer;z-index:601}

/* Responsive */
@media(max-width:900px){
  .card-view{display:none!important}
  .detail-view{display:block!important}
  .mode-switch{display:none}
  nav{flex-wrap:wrap;height:auto;padding:.5rem 0;gap:.3rem}
  .logo{width:100%;justify-content:center}
  .nav-links{width:100%;justify-content:center;flex-wrap:wrap;gap:.35rem .7rem}
  .nav-links a{font-size:.78rem;white-space:nowrap}
  .nav-sp,.nav-maj,.pbn{display:none}
  .disc-btn{margin:0 auto .2rem}
}
</style>
</head>
<body>
<header>
  <nav>
    <div class="logo" onclick="window.location.href='index.html'">
      <img src="images/logo-chronologeek.png" alt="Chronologeek"/>
    </div>
    <div class="nav-links">
      <a onclick="window.location.href='index.html'">Accueil</a>
      <a onclick="window.location.href='starwars.html'">Star Wars</a>
      <a onclick="window.location.href='marvel.html'">Marvel</a>
      <a onclick="window.location.href='dc.html'" style="color:var(--text);font-weight:700">DC</a>
      <a href="#">Dossiers</a>
      <a href="#">Communauté</a>
    </div>
    <div class="nav-sp"></div>
    <span class="nav-maj">À jour · juin 2026</span>
    <div class="pbn" id="pbn"><span id="pbn-label">0/0</span><div class="pbn-track"><div class="pbn-fill" id="pbn-fill" style="width:0%"></div></div></div>
    <a href="#" class="disc-btn">Discord</a>
  </nav>
</header>

<div class="pm" id="pm" onclick="closePM()"><span class="pm-x">✕</span><img id="pmi" src="" alt=""/></div>

<!-- Modal vue carte -->
<div class="cv-modal" id="cv-modal">
  <div class="cv-modal-inner" id="cv-modal-inner">
    <button class="cv-modal-close" onclick="closeCvModal()">✕</button>
    <div class="cv-modal-title" id="cv-modal-title"></div>
    <div class="cv-modal-meta" id="cv-modal-meta"></div>
    <div class="cv-modal-body" id="cv-modal-body"><div class="expand-loading">Chargement…</div></div>
  </div>
</div>

<div class="tl-page">
  <div class="bc" onclick="window.location.href='index.html'">← Accueil</div>
  <div class="page-title" id="tl-title">DC Multivers — Timeline Optimisée</div>
  <div class="page-sub">Elseworlds · Arrowverse · DCEU · DCU</div>

  <div class="progress-block">
    <div class="pb-info">
      <div class="pb-label">Ma progression</div>
      <div class="pb-track"><div class="pb-fill" id="pb-fill" style="width:0%"></div></div>
      <div class="pb-counts" id="pb-counts">0 / 0 · 0%</div>
      <div class="pb-hint">Vous pouvez cocher votre progression qui sera sauvegardée sur ce navigateur</div>
    </div>
    <button class="pb-reset" onclick="resetProgress()">Reset</button>
  </div>

  <div class="nb" id="tl-notes"></div>
  <div class="leg" id="tl-legend"></div>

  <!-- Switch de mode -->
  <div class="mode-switch">
    <button class="mode-btn active" id="btn-mode-carte" onclick="setMode('carte')">Vue globale</button>
    <button class="mode-btn" id="btn-mode-detail" onclick="setMode('detail')">Vue détail</button>
  </div>

  <!-- Filtres (vue détail) -->
  <div id="filter-bar" style="display:none"></div>

  <!-- VUE CARTE -->
  <div class="card-view active" id="card-view"></div>

  <!-- VUE DÉTAIL -->
  <div class="detail-view" id="detail-view"></div>
</div>

<script>
// ════════════════════════════════════════════════════
// DONNÉES
// ════════════════════════════════════════════════════
const TMDB_KEY='6257b37bf29ab31357853fce00232314';
const IMG='https://image.tmdb.org/t/p/';

const NOTES=`Je commencerai par vous prévenir que ce dossier est un énorme bordel, bien qu'ayant enlevé beaucoup de médias, regarder tout le reste nécessite beaucoup beaucoup de temps. Si vous êtes là seulement pour voir l'Arrow-Verse, le DCEU ou le DCU, vous pouvez choisir de le faire en sélectionnant l'univers en vue détail.<br><br>
<strong>Question légitime : en quoi tout ce bordel est relié ?</strong><br>
Cet ordre privilégie la découverte progressive du Multivers DC. Plusieurs séries et films se déroulent dans des réalités différentes mais finissent par partager des liens. Regarder les œuvres dans cet ordre permet de mieux comprendre les personnages, les références et les événements qui connectent ces univers, tout en préservant les surprises majeures.<br><br>
Il manque des choses mais elles ne sont <strong>pas du tout</strong> importantes pour la compréhension de la chronologie du Multivers et des événements importants (<strong>tous les médias sortis avant 1989, les séries Flash (1990), Loïs & Clark, Lucifer, Krypton, Pennyworth, Wonder Woman (1976), Swamp-Thing, Doom Patrol, Powerless, les Anges de la Nuit, le film Constantine (2005), le film et la série Watchmen, les 2 films Joker, le film Green Lantern, le film Catwoman, plein d'autres films peu connus, presque tous les films d'animation et dessins animés, tous les comics, tous les jeux-vidéo…</strong>)<br><br>
Les deux chronologies principales de l'univers se passent sur la <strong>Terre-Prime</strong> et la <strong>Terre-1</strong>.<br><br>
Le terme <strong>soft-canon</strong> désigne un média dont les événements sont en partie survenus de la même manière, plus d'infos dans les descriptions.<br><br>
Le Multivers DC fonctionne d'une manière particulière : deux personnages différents peuvent avoir exactement la même tête (exemples : le père de Flash (2014) et Flash (1990), Supergirl (1984) et la mère de Superman (Smallville) mais aussi la mère adoptive de Supergirl (2015)).<br><br>
Certains événements sont mieux à voir en tant que <strong>FLASHBACK</strong> pour comprendre et sont donc indiqués comme tel.<br><br>
<strong>Niveaux :</strong> 🚨 = Important`;

// Couleurs Arrowverse par série
const AV_C={
  'Arrow':'#00c850','The Flash':'#ffc800','Supergirl':'#a78bfa',
  'Legends of Tomorrow':'#f97316','Batwoman':'#f43f5e',
  'Black Lightning':'#60a5fa','Constantine':'#c084fc',
  'Crisis on Infinite Earths':'#ffd700'
};

const COLS=[
  {id:'elseworlds',label:'Elseworlds',color:'#c084fc',wide:true,
   subs:[
     {id:'superman',label:'Superman',entries:['dc-smallville','dc-supermanreturns','dc-supermanlois']},
     {id:'batman', label:'Batman', entries:['dc-batman89','dc-batmanreturns','dc-batmanbegins','dc-tdk','dc-tdkr','dc-gotham','dc-thebatman','dc-thepenguin']},
     {id:'autres', label:'Autres',  entries:['dc-titans-s1','dc-titans-s2','dc-stargirl-s1','dc-stargirl-s2','dc-stargirl-s3','dc-titans-s3','dc-titans-s4']}
   ]},
  {id:'arrowverse',label:'Arrowverse',color:'#22c55e'},
  {id:'dceu',label:'DCEU',color:'#3b82f6'},
  {id:'dcu',label:'DCU',color:'#f97316',startLate:true},
];

// Toutes les entrées indexées par id

const BADGES={film:'FILM',serie:'SÉRIE'};
const BADGE_CSS={film:'bf',serie:'bs'};
let currentMode='carte';
const detailCache={};

function getProgress(){try{return JSON.parse(localStorage.getItem('cg_dc')||'{}')}catch{return{}}}
function saveProgress(obj){localStorage.setItem('cg_dc',JSON.stringify(obj))}

function toggleEntry(id,ev){
  if(ev)ev.stopPropagation();
  const prog=getProgress();
  prog[id]?delete prog[id]:(prog[id]=1);
  saveProgress(prog);
  renderProgress();
  // Mettre à jour les deux vues
  document.querySelectorAll(`[data-id="${id}"]`).forEach(el=>{
    el.classList.toggle('done',!!prog[id]);
    el.querySelectorAll('.checkmark,.cv-check-inner').forEach(c=>c.textContent=prog[id]?'✓':'');
    if(prog[id])el.querySelector('.cv-check,.en-check')?.style&&(el.querySelector('.cv-check,.en-check').style.background=prog[id]?'var(--accent)':'');
  });
}

function resetProgress(){
  if(!confirm('Réinitialiser ta progression ?'))return;
  localStorage.removeItem('cg_dc');
  renderProgress();
  document.querySelectorAll('.done').forEach(el=>el.classList.remove('done'));
  document.querySelectorAll('.checkmark,.cv-check-inner').forEach(c=>c.textContent='');
}

function renderProgress(){
  const prog=getProgress();
  const total=Object.keys(ENTRIES).length;
  const done=Object.keys(prog).length;
  const pct=total?Math.round(done/total*100):0;
  const grad='linear-gradient(90deg,#1e90ff,var(--accent2))';
  const pb=document.getElementById('pb-fill');
  if(pb)pb.style.cssText='width:'+pct+'%;background:'+grad;
  const pc=document.getElementById('pb-counts');
  if(pc)pc.innerHTML='<strong>'+done+'</strong> / '+total+' vus · <strong>'+pct+'%</strong>';
  const pbn=document.getElementById('pbn');
  if(pbn){pbn.classList.toggle('show',total>0);document.getElementById('pbn-label').textContent=done+'/'+total;document.getElementById('pbn-fill').style.cssText='width:'+pct+'%;background:'+grad}
}

// ── VUE CARTE ────────────────────────────────────────
function buildCardEntry(e){
  const prog=getProgress();
  const isDone=!!prog[e.id];
  const col=COLS.find(c=>c.id===e.col)||{color:'#fff'};
  let bg=col.color+'22',border=col.color+'55';
  if(e.col==='arrowverse'){const c=AV_C[e.title]||col.color;bg=c+'20';border=c+'60'}
  const isCrisis=e.id==='av-crisis';
  if(isCrisis){bg='rgba(255,215,0,.15)';border='rgba(255,215,0,.6)'}
  return `<div class="cv-entry${isDone?' done':''}" data-id="${e.id}" style="background:${bg};border-color:${border};${e.col==='arrowverse'?'border-left:3px solid '+(AV_C[e.title]||col.color)+';':''}"
    onclick="openCvModal('${e.id}')">
    <div style="display:flex;align-items:center;gap:3px">
      <span class="cv-check" onclick="event.stopPropagation();toggleEntry('${e.id}')"><span class="cv-check-inner">${isDone?'✓':''}</span></span>
      <span class="cv-entry-title">${e.level==='must'?'🚨 ':''}<span style="color:${e.col==='arrowverse'?AV_C[e.title]||col.color:col.color}">${e.title}</span></span>
    </div>
    <div class="cv-entry-date">${e.date||'—'} <span class="cv-entry-dim">${e.dim||''}</span></div>
  </div>`;
}

function buildCardView(){
  const container=document.getElementById('card-view');
  let html='';

  // Axe temporel
  html+='<div class="time-axis">';
  const years=[1989,1992,2000,2005,2006,2008,2012,2013,2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025];
  years.forEach(y=>{html+=`<div class="time-tick" style="margin-bottom:${y<2012?'8px':'4px'}">${y}</div>`});
  html+='</div>';

  html+='<div class="cv-cols">';

  // Colonne Elseworlds (wide, 3 sous-colonnes)
  const elseCol=COLS[0];
  html+=`<div class="cv-col wide" data-col="elseworlds">
    <div class="cv-col-head" style="border-bottom-color:${elseCol.color};color:${elseCol.color}">${elseCol.label}</div>
    <div class="cv-inner">`;
  elseCol.subs.forEach(sub=>{
    html+=`<div class="cv-sub-col"><div class="cv-sub-head" style="color:${elseCol.color}">${sub.label}</div>`;
    sub.entries.forEach(eid=>{
      const e=ENTRIES[eid];
      if(e)html+=buildCardEntry(e);
    });
    html+='</div>';
  });
  html+='</div></div>';

  // Arrowverse
  const avCol=COLS[1];
  html+=`<div class="cv-col" data-col="arrowverse">
    <div class="cv-col-head" style="border-bottom-color:${avCol.color};color:${avCol.color}">${avCol.label}</div>`;
  COL_ENTRIES.arrowverse.forEach(eid=>{
    const e=ENTRIES[eid];
    if(e)html+=buildCardEntry(e);
  });
  html+='</div>';

  // DCEU
  const dceuCol=COLS[2];
  html+=`<div class="cv-col" data-col="dceu">
    <div class="cv-col-head" style="border-bottom-color:${dceuCol.color};color:${dceuCol.color}">${dceuCol.label}</div>`;
  // Spacer pour aligner 2013 avec l'Arrowverse 2012
  html+='<div style="height:28px"></div>';
  COL_ENTRIES.dceu.forEach(eid=>{
    const e=ENTRIES[eid];
    if(e)html+=buildCardEntry(e);
  });
  html+='</div>';

  // DCU — spacer pour commencer en 2024
  const dcuCol=COLS[3];
  html+=`<div class="cv-col" data-col="dcu">
    <div class="cv-col-head" style="border-bottom-color:${dcuCol.color};color:${dcuCol.color}">${dcuCol.label}</div>`;
  // Spacer important
  html+='<div class="cv-spacer" style="min-height:1200px"></div>';
  COL_ENTRIES.dcu.forEach(eid=>{
    const e=ENTRIES[eid];
    if(e)html+=buildCardEntry(e);
  });
  html+='</div>';

  html+='</div>';
  container.innerHTML=html;
}

// ── MODAL VUE CARTE ──────────────────────────────────
async function openCvModal(id){
  const e=ENTRIES[id];
  if(!e)return;
  const modal=document.getElementById('cv-modal');
  const title=document.getElementById('cv-modal-title');
  const meta=document.getElementById('cv-modal-meta');
  const body=document.getElementById('cv-modal-body');
  title.textContent=e.title;
  const col=COLS.find(c=>c.id===e.col);
  const avColor=e.col==='arrowverse'?AV_C[e.title]:'';
  const color=avColor||col?.color||'#fff';
  meta.innerHTML=`<span class="b ${BADGE_CSS[e.type]||'bsp'}">${BADGES[e.type]||e.type}</span>`
    +(e.dim?`<span class="dim-badge">${e.dim}</span>`:'')
    +(e.date?`<span style="font-size:.72rem;color:var(--muted2)">${e.date}</span>`:'')
    +(e.tags?.includes('flashback')?'<span class="ft">FLASHBACK</span>':'')
    +(e.level==='must'?'<span style="font-size:.72rem">🚨 Important</span>':'');
  body.innerHTML='<div class="expand-loading">Chargement…</div>';
  modal.classList.add('open');

  // Charger TMDB
  if(!e.tmdb||e.tmdb==='0'){
    body.innerHTML='<p style="color:var(--muted2);font-size:.82rem">Pas d\'informations TMDB pour cette entrée.</p>'
      +(e.note?`<p style="color:var(--muted2);font-size:.8rem;margin-top:.5rem;font-style:italic">${e.note}</p>`:'')
      +(e.subitems?.length?`<div style="margin-top:.5rem">${e.subitems.map(s=>`<div class="si">${s}</div>`).join('')}</div>`:'');
    return;
  }
  const type=e.media==='movie'?'movie':'tv';
  const k=type+e.tmdb;
  let d=detailCache[k];
  if(!d){
    try{
      const r=await fetch(`https://api.themoviedb.org/3/${type}/${e.tmdb}?api_key=${TMDB_KEY}&language=fr-FR&append_to_response=videos`);
      d=await r.json();
      if(!d.videos?.results?.find(v=>v.type==='Trailer'&&v.site==='YouTube')){
        const re=await fetch(`https://api.themoviedb.org/3/${type}/${e.tmdb}/videos?api_key=${TMDB_KEY}&language=en-US`);
        const ev=await re.json();
        if(ev.results)d.videos={results:[...((d.videos?.results)||[]),...ev.results]};
      }
      detailCache[k]=d;
    }catch{body.innerHTML='<p style="color:var(--muted2)">Erreur de chargement.</p>';return}
  }
  const synopsis=d.overview||'Pas de synopsis disponible.';
  const poster=d.poster_path?IMG+'w300'+d.poster_path:null;
  const trailer=(d.videos?.results||[]).find(v=>v.type==='Trailer'&&v.site==='YouTube');
  const rating=d.vote_average?'⭐ '+d.vote_average.toFixed(1)+'/10':'';
  const year=(d.release_date||d.first_air_date||'').substring(0,4);
  body.innerHTML=`<div style="display:flex;gap:.85rem">
    ${poster?`<div style="width:80px;flex-shrink:0;cursor:pointer" onclick="openPMurl('${IMG}w500${d.poster_path}')"><img src="${poster}" style="width:100%;border-radius:8px;display:block"/></div>`:''}
    <div style="flex:1;min-width:0">
      <p style="font-size:.8rem;line-height:1.6;color:var(--muted2);margin-bottom:.5rem">${synopsis}</p>
      <div style="display:flex;flex-wrap:wrap;gap:.3rem .7rem;font-size:.72rem;color:var(--muted2);margin-bottom:.5rem">
        ${year?`<span><strong style="color:var(--text)">Année</strong> ${year}</span>`:''}
        ${rating?`<span>${rating}</span>`:''}
      </div>
      ${e.note?`<p style="font-size:.78rem;color:var(--muted2);font-style:italic;margin-bottom:.4rem">${e.note}</p>`:''}
      ${e.subitems?.length?`<div>${e.subitems.map(s=>`<div class="si">${s}</div>`).join('')}</div>`:''}
      ${trailer?`<a href="https://www.youtube.com/watch?v=${trailer.key}" target="_blank" rel="noopener" class="expand-trailer-link" style="margin-top:.4rem;display:inline-block">▶ Bande-annonce YouTube</a>`:''}
    </div>
  </div>`;
}
function closeCvModal(){document.getElementById('cv-modal').classList.remove('open')}
document.getElementById('cv-modal').addEventListener('click',e=>{if(e.target===document.getElementById('cv-modal'))closeCvModal()})

// ── VUE DÉTAIL ───────────────────────────────────────
let detailColsVisible=new Set(['arrowverse']);

function buildDetailView(){
  const container=document.getElementById('detail-view');
  const fb=document.getElementById('filter-bar');

  // Boutons sélection colonne
  let selHtml='<div class="detail-col-select">';
  COLS.forEach(col=>{
    const active=detailColsVisible.has(col.id);
    selHtml+=`<button class="dcol-btn${active?' active':''}" data-col="${col.id}"
      style="border-color:${col.color};color:${col.color}${active?';background:'+col.color+'22':''}"
      onclick="toggleDetailCol('${col.id}')">${col.label}</button>`;
  });
  selHtml+='</div>';

  // Filtres types
  let types=new Set(Object.values(ENTRIES).map(e=>e.type));
  let f='<div class="filter-group"><span class="filter-label">Types :</span>';
  types.forEach(t=>{
    f+=`<button class="fbt type-filter-btn active" data-type="${t}" onclick="this.classList.toggle('active');applyDetailFilters()">${BADGES[t]||t}</button>`;
  });
  f+='</div>';
  f+='<div class="filter-group"><span class="filter-label">Niveaux :</span>'
    +'<button class="fbt level-filter-btn active" id="lvl-must" onclick="this.classList.toggle(\'active\');applyDetailFilters()">🚨 Important</button>'
    +'<button class="fbt level-filter-btn active" id="lvl-bonus" onclick="this.classList.toggle(\'active\');applyDetailFilters()">Bonus</button>'
    +'</div>';
  fb.innerHTML=f;

  renderDetailSections();
  container.insertAdjacentHTML('afterbegin',selHtml);
}

function renderDetailSections(){
  const container=document.getElementById('detail-view');
  // Supprimer les sections existantes
  container.querySelectorAll('.detail-col-section').forEach(el=>el.remove());

  COLS.forEach(col=>{
    if(!detailColsVisible.has(col.id))return;
    const section=document.createElement('div');
    section.className='detail-col-section';
    section.dataset.col=col.id;

    let html=`<div class="era-node"><div class="era-node-dot" style="background:${col.color}"></div><div class="era-label" style="color:${col.color}">${col.label}</div></div>`;

    if(col.id==='elseworlds'){
      col.subs.forEach(sub=>{
        html+=`<div class="era-node" style="margin-left:.8rem"><div class="era-node-dot" style="background:${col.color};width:6px;height:6px"></div><div class="era-label" style="color:${col.color};font-size:.62rem">${sub.label}</div></div>`;
        sub.entries.forEach(eid=>{
          const e=ENTRIES[eid];
          if(e)html+=buildDetailEntry(e,col.color);
        });
      });
    } else {
      const ids=COL_ENTRIES[col.id]||[];
      ids.forEach(eid=>{
        const e=ENTRIES[eid];
        if(e)html+=buildDetailEntry(e,col.id==='arrowverse'?(AV_C[e.title]||col.color):col.color);
      });
    }
    section.innerHTML=html;
    container.appendChild(section);
  });
  applyDetailFilters();
  loadDetailPosters();
}

function toggleDetailCol(colId){
  if(detailColsVisible.has(colId)){
    if(detailColsVisible.size===1)return; // garder au moins une
    detailColsVisible.delete(colId);
  } else {
    detailColsVisible.add(colId);
  }
  // Mettre à jour les boutons
  document.querySelectorAll('.dcol-btn').forEach(btn=>{
    const col=COLS.find(c=>c.id===btn.dataset.col);
    const active=detailColsVisible.has(btn.dataset.col);
    btn.classList.toggle('active',active);
    btn.style.background=active?col.color+'22':'';
  });
  renderDetailSections();
}

function buildDetailEntry(e,accentColor){
  const prog=getProgress();
  const isDone=!!prog[e.id];
  const levelClass=e.level==='must'?'imp':'';
  const levelIcon=e.level==='must'?'🚨':'';
  let pre='';
  if(e.tags?.includes('flashback'))pre+='<span class="ft">FLASHBACK</span>';
  const dimBadge=e.dim?`<div class="dim-badge">${e.dim}</div>`:'';
  const imgAttr=e.img?` data-img="${e.img}"`:'';
  const sub=e.subitems?.length?'<div class="esub">'+e.subitems.map(s=>`<div class="si">${s}</div>`).join('')+'</div>':'';
  const note=e.note?`<div class="enote">${e.note}</div>`:'';
  const isCrisis=e.id==='av-crisis';

  return `<div class="en ${levelClass}${isDone?' done':''}${isCrisis?' crisis-en':''}"
    data-id="${e.id}" data-type="${e.type}" data-level="${e.level||'bonus'}"
    data-tmdb="${e.tmdb||'0'}" data-media="${e.media||'tv'}"
    style="${e.col==='arrowverse'?'border-left:3px solid '+accentColor+';':''}${isCrisis?'border:1px solid rgba(255,215,0,.5);background:rgba(255,215,0,.06);':''}">
    <div class="en-top" onclick="toggleDetailExpand(this.closest('.en'),event)">
      <div class="en-check" onclick="toggleEntry('${e.id}',event)"><div class="checkmark">${isDone?'✓':''}</div></div>
      <div class="en-datebadge"><div class="en-level-icon">${levelIcon}</div><div class="date-main">${e.date||'—'}</div>${dimBadge}</div>
      <div class="ep"${imgAttr}><div class="pp">${e.type==='film'?'🎬':'📺'}</div></div>
      <div class="em"><div class="tr">${pre}<span class="b ${BADGE_CSS[e.type]||'bsp'}">${BADGES[e.type]||e.type}</span><span class="en-name">${e.title}</span></div>${note}${sub}</div>
    </div>
    <div class="en-expand" onclick="event.stopPropagation()"></div>
  </div>`;
}

async function toggleDetailExpand(el,ev){
  if(ev.target.closest('.en-check'))return;
  const wasOpen=el.classList.contains('open');
  document.querySelectorAll('.en.open').forEach(x=>x.classList.remove('open'));
  if(wasOpen)return;
  el.classList.add('open');
  const panel=el.querySelector('.en-expand');
  if(panel.dataset.loaded)return;
  panel.dataset.loaded='1';
  const id=el.dataset.id;
  const e=ENTRIES[id];
  const tmdb=el.dataset.tmdb,media=el.dataset.media;
  if(!tmdb||tmdb==='0'){
    panel.innerHTML='<div class="expand-no-data">Pas d\'informations TMDB.</div>';
    return;
  }
  panel.innerHTML='<div class="expand-loading">Chargement…</div>';
  const type=media==='movie'?'movie':'tv';
  const k=type+tmdb;
  let d=detailCache[k];
  if(!d){
    try{
      const rFr=await fetch(`https://api.themoviedb.org/3/${type}/${tmdb}?api_key=${TMDB_KEY}&language=fr-FR&append_to_response=videos`);
      d=await rFr.json();
      if(!d.videos?.results?.find(v=>v.type==='Trailer'&&v.site==='YouTube')){
        const rEn=await fetch(`https://api.themoviedb.org/3/${type}/${tmdb}/videos?api_key=${TMDB_KEY}&language=en-US`);
        const ev2=await rEn.json();
        if(ev2.results)d.videos={results:[...((d.videos?.results)||[]),...ev2.results]};
      }
      detailCache[k]=d;
    }catch{panel.innerHTML='<div class="expand-loading">Erreur.</div>';return}
  }
  const synopsis=d.overview||'Pas de synopsis disponible.';
  const runtime=d.runtime?(d.runtime+' min'):(d.episode_run_time?.[0]?(d.episode_run_time[0]+' min/ép'):null);
  const genres=(d.genres||[]).map(g=>g.name).join(', ')||null;
  const year=(d.release_date||d.first_air_date||'').substring(0,4)||null;
  const rating=d.vote_average?d.vote_average.toFixed(1):null;
  const poster=d.poster_path?IMG+'w300'+d.poster_path:null;
  const trailer=(d.videos?.results||[]).find(v=>v.type==='Trailer'&&v.site==='YouTube');
  const ytUrl=trailer?'https://www.youtube.com/watch?v='+trailer.key:null;
  let meta='';
  if(year)meta+=`<span><strong>Année</strong> ${year}</span>`;
  if(runtime)meta+=`<span><strong>Durée</strong> ${runtime}</span>`;
  if(genres)meta+=`<span><strong>Genre</strong> ${genres}</span>`;
  if(rating)meta+=`<span><strong>Note</strong> ⭐ ${rating}/10</span>`;
  panel.innerHTML=`<div class="expand-inner">
    ${poster?`<div class="expand-poster" onclick="openPMurl('${IMG}w500${d.poster_path}')"><img src="${poster}" loading="lazy"/><div class="expand-poster-ov">🔍</div></div>`:''}
    <div class="expand-info">
      <div class="expand-synopsis">${synopsis}</div>
      ${meta?`<div class="expand-meta">${meta}</div>`:''}
      ${e?.note?`<div class="enote">${e.note}</div>`:''}
      ${ytUrl?`<a class="expand-trailer-link" href="${ytUrl}" target="_blank" rel="noopener">▶ Bande-annonce YouTube</a>`:''}
    </div>
  </div>`;
}

function applyDetailFilters(){
  const showTypes=new Set([...document.querySelectorAll('.type-filter-btn.active')].map(b=>b.dataset.type));
  const showMust=document.getElementById('lvl-must')?.classList.contains('active')??true;
  const showBonus=document.getElementById('lvl-bonus')?.classList.contains('active')??true;
  document.querySelectorAll('#detail-view .en').forEach(el=>{
    const typeOk=showTypes.size===0||showTypes.has(el.dataset.type);
    const lvl=el.dataset.level;
    const lvlOk=(lvl==='must'&&showMust)||((lvl==='bonus'||!lvl)&&showBonus);
    el.style.display=(typeOk&&lvlOk)?'':'none';
  });
}

function loadDetailPosters(){
  document.querySelectorAll('#detail-view .ep[data-img]').forEach(ep=>{
    if(ep.querySelector('img.loaded'))return;
    const img=ep.querySelector('img')||document.createElement('img');
    if(!img.src||img.src===window.location.href){
      img.src=ep.dataset.img;img.loading='lazy';img.className='';
      img.onload=()=>img.classList.add('loaded');
      img.onerror=()=>img.remove();
      ep.querySelector('.pp')?.remove();
      ep.appendChild(img);
    }
  });
}

// ── SWITCH MODE ──────────────────────────────────────
function setMode(mode){
  currentMode=mode;
  document.getElementById('btn-mode-carte').classList.toggle('active',mode==='carte');
  document.getElementById('btn-mode-detail').classList.toggle('active',mode==='detail');
  document.getElementById('card-view').classList.toggle('active',mode==='carte');
  document.getElementById('detail-view').classList.toggle('active',mode==='detail');
  document.getElementById('filter-bar').style.display=mode==='detail'?'flex':'none';
}

// ── LÉGENDE ──────────────────────────────────────────
function buildLegend(){
  document.getElementById('tl-notes').innerHTML=NOTES;
  let leg='<span class="leg-title">Légende</span>';
  leg+='<span class="b bf">FILM</span><span class="b bs">SÉRIE</span>';
  leg+='<span>🚨 Important</span>';
  leg+='<span class="ft">FLASHBACK</span>';
  leg+='<span class="dt">TERRE-XXXX</span>';
  // Couleurs Arrowverse
  leg+='<span style="font-size:.68rem;color:var(--muted);margin-left:.5rem">Arrowverse :</span>';
  Object.entries(AV_C).slice(0,5).forEach(([name,color])=>{
    leg+=`<span style="font-size:.65rem;padding:1px 6px;border-radius:3px;border-left:3px solid ${color};background:${color}18;color:${color}">${name.replace('Legends of Tomorrow','Legends')}</span>`;
  });
  document.getElementById('tl-legend').innerHTML=leg;
}

function openPMurl(url){const pm=document.getElementById('pm');const pmi=document.getElementById('pmi');if(pm&&pmi){pmi.src=url;pm.classList.add('o')}}
function closePM(){document.getElementById('pm')?.classList.remove('o')}

// ── INIT ─────────────────────────────────────────────
buildLegend();
buildCardView();
buildDetailView();
setMode('carte');
renderProgress();
</script>
